<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Certificate PDF Not Found</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #050a14;
        color: #dbe7ff;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 24px;
      }
      .card {
        width: min(680px, 100%);
        border: 1px solid rgba(140, 163, 199, 0.32);
        border-radius: 12px;
        background: rgba(10, 22, 42, 0.82);
        padding: 18px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 1.25rem;
      }
      p {
        margin: 0 0 10px;
        color: #9fb4d7;
        line-height: 1.5;
      }
      a {
        color: #8ee6ff;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Certificate PDF Not Found</h1>
      <p>The requested certificate PDF is not available yet.</p>
      <p>Go back to <a href="/certifications">/certifications</a> and open the certificate details page.</p>
    </main>
  </body>
</html>
