# Redirect Netlify default domain → your main .in domain
[[redirects]]
  from = "https://imprakhartripathi.netlify.app/*"
  to = "https://imprakhartripathi.in/:splat"
  status = 301
  force = true

# Redirect www → root domain
[[redirects]]
  from = "https://www.imprakhartripathi.in/*"
  to = "https://imprakhartripathi.in/:splat"
  status = 301
  force = true

# Missing certification PDFs should resolve to a dedicated fallback page (existing files shadow this rule).
[[redirects]]
  from = "/certifications/*.pdf"
  to = "/certifications-pdf-not-found.html"
  status = 404

# SPA fallback: serve index.html for direct deep links like /projects
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
